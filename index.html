<!DOCTYPE html>
<html lang="en">
<head>

<title>Armory — Navy & White</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
  // Wait for scripts to fully load before initializing
  function initFirebase() {
    const firebaseConfig = {
      apiKey: "AIzaSyDw95urlhjKkXqBcj4LNgkHpmWydFsHLR0",
      authDomain: "firearm-inventory-5d0be.firebaseapp.com",
      projectId: "firearm-inventory-5d0be",
      storageBucket: "firearm-inventory-5d0be.firebasestorage.app",
      messagingSenderId: "1060866359048",
      appId: "1:1060866359048:web:6373c8ba96e8236b9176bd"
    };

  try {
    if (typeof firebase === 'undefined') throw new Error('Firebase SDK not loaded');
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const DOC_REF = db.collection("armory").doc("inventory");

    window._fbSave = async function(dataArr) {
      try {
        const dataNoPhotos = dataArr.map(d => {
          const copy = Object.assign({}, d);
          if (copy.photo && copy.photo.length > 1000) delete copy.photo;
          return copy;
        });
        await DOC_REF.set({ data: dataNoPhotos, updated: new Date().toISOString() });
        return true;
      } catch (e) {
        console.error("Firebase Save Error:", e);
        return false;
      }
    };

    window._fbLoad = async function() {
      try {
        const snap = await DOC_REF.get();
        if (snap.exists) return snap.data().data;
        return null;
      } catch (e) {
        console.error("Firebase Load Error:", e);
        return null;
      }
    };

    window._fbListen = function(callback) {
      return DOC_REF.onSnapshot((snap) => {
        if (snap.exists) {
          const remoteData = snap.data().data || [];
          callback(remoteData);
        }
      });
    };

    window._fbReady = true;
    document.dispatchEvent(new Event('firebase-ready'));
  } catch (e) {
    console.error("Firebase Init Error:", e);
    window._fbReady = false;
    document.dispatchEvent(new Event('firebase-ready'));
  }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initFirebase);
  } else {
    initFirebase();
  }
</script>
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #e8ebf0;
    --border: #d0d5dd;
    --accent: #1c3557; 
    --accent2: #2563a8;
    --red: #c0392b;
    --text: #111827;
    --muted: #6b7280;
    --green: #166534;
    --purple: #5b21b6;
    --navy-dark: #0f1c2e;
    --gold: #c9a84c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    font-size: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── Layout ─── */
  .top-panel {
    flex-shrink: 0;
    position: relative;
    z-index: 20;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    position: relative;
    background: #fff;
  }

  /* ─── Header ─── */
  .header {
    background: var(--accent);
    border-bottom: 2px solid #122440;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo span { color: var(--gold); }
  .stats { display: flex; gap: 24px; }
  .stat { text-align: right; }
  .stat-num { font-size: 24px; font-weight: 600; color: var(--gold); line-height: 1; }
  .stat-label { font-size: 9px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 2px; }

  /* ─── Toolbar ─── */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .toolbar-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-box {
    position: relative;
    flex: 1;
    min-width: 250px;
  }
  .search-box input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    transition: all 0.2s;
  }
  .search-box input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(37,99,168,0.1); }
  .search-box svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    color: var(--muted);
  }

  .btn {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-accent { background: var(--accent); color: #ffffff; }
  .btn-accent:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ─── Table ─── */
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1100px;
    table-layout: fixed;
  }
  thead th {
    background: #d8e1ed;
    color: var(--accent);
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 2px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: #f8fafc; }
  tbody td {
    padding: 8px 12px;
    vertical-align: top;
    line-height: 1.4;
  }
  .col-name { width: 18%; font-weight: 600; color: var(--accent); }
  .col-upc { width: 12%; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
  .col-desc { width: 25%; font-size: 12px; color: var(--muted); line-height: 1.3; }
  .col-spec { width: 8%; text-align: center; }
  .col-actions { width: 10%; text-align: right; }

  .badge {
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .badge-type { background: #e0e7ff; color: #4338ca; }
  .badge-cal { background: #fef3c7; color: #92400e; }

  .editable:hover { background: #fffbeb; cursor: text; outline: 1px dashed var(--gold); }

  /* ─── Modal ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 28, 46, 0.75);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    width: 100%;
    max-width: 500px;
    border-radius: 12px;
    box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    overflow: hidden;
    animation: modalIn 0.3s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .modal-header {
    background: var(--accent);
    padding: 16px 20px;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-body { padding: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    outline: none;
  }
  .modal-footer {
    padding: 16px 20px;
    background: #f9fafb;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* ─── Bulk Progress ─── */
  #bulkProgressOverlay .modal { max-width: 600px; }
  .progress-container { background: #e5e7eb; border-radius: 10px; height: 10px; overflow: hidden; margin: 15px 0; }
  #bulkProgressBar { background: var(--accent2); width: 0%; height: 100%; transition: width 0.3s; }
  #bulkResultLog {
    background: var(--navy-dark);
    color: #a5b4fc;
    padding: 12px;
    border-radius: 6px;
    height: 200px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.5;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 500;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    z-index: 1000;
    display: none;
  }

  /* ─── Photo Preview ─── */
  .photo-cell {
    width: 48px;
    height: 48px;
    background: #f1f5f9;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-cell img { width: 100%; height: 100%; object-fit: cover; }
  .photo-cell svg { color: var(--muted); }
</style>
</head>
