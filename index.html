<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Armory — Navy & White</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
  function initFirebase() {
    const firebaseConfig = {
      apiKey: "AIzaSyDw95urlhjKkXqBcj4LNgkHpmWydFsHLR0",
      authDomain: "firearm-inventory-5d0be.firebaseapp.com",
      projectId: "firearm-inventory-5d0be",
      storageBucket: "firearm-inventory-5d0be.firebasestorage.app",
      messagingSenderId: "1060866359048",
      appId: "1:1060866359048:web:6373c8ba96e8236b9176bd"
    };
  try {
    if(typeof firebase === 'undefined') throw new Error('Firebase SDK not loaded');
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const DOC_REF = db.collection("armory").doc("inventory");
    window._fbSave = async function(dataArr) {
      try {
        const dataNoPhotos = dataArr.map(d => {
          const copy = Object.assign({}, d);
          if(copy.photo && copy.photo.length > 1000) delete copy.photo;
          return copy;
        });
        await DOC_REF.set({ data: dataNoPhotos, updated: new Date().toISOString() });
        return true;
      } catch(e) { return false; }
    };
    window._fbLoad = async function() {
      try {
        const snap = await DOC_REF.get();
        return snap.exists ? snap.data().data : null;
      } catch(e) { return null; }
    };
    window._fbListen = function(callback) {
      return DOC_REF.onSnapshot((snap) => { if(snap.exists) callback(snap.data().data || []); });
    };
    window._fbReady = true;
    document.dispatchEvent(new Event('firebase-ready'));
  } catch(e) { window._fbReady = false; document.dispatchEvent(new Event('firebase-ready')); }
  }
  if(document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initFirebase); } else { initFirebase(); }
</script>
<style>
  :root { --bg: #f0f2f5; --surface: #ffffff; --surface2: #e8ebf0; --border: #d0d5dd; --accent: #1c3557; --accent2: #2563a8; --red: #c0392b; --text: #111827; --muted: #6b7280; --green: #166534; --purple: #5b21b6; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; font-size: 14px; overflow: hidden; display: flex; flex-direction: column; }
  .top-panel { flex-shrink: 0; position: relative; z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
  .scroll-area { flex: 1; overflow-y: auto; overflow-x: auto; }
  .header { background: var(--accent); border-bottom: 2px solid #122440; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 28px; font-weight: 700; color: #ffffff; letter-spacing: 4px; text-transform: uppercase; }
  .stats { display: flex; gap: 24px; }
  .stat-num { font-size: 24px; font-weight: 600; color: #c9a84c; }
  .stat-label { font-size: 9px; color: rgba(255,255,255,0.55); text-transform: uppercase; }
  .toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 6px 16px; display: flex; flex-direction: column; gap: 6px; }
  .toolbar-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .btn-accent { background: var(--accent); color: #ffffff; }
  .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; min-width: 1100px; }
  thead th { background: #d8e1ed; padding: 10px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody td { padding: 8px 10px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; padding: 24px; border-radius: 12px; width: 500px; max-width: 90%; }
  #bulkResultLog { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 12px; margin-top: 10px; }
</style>
</head>
<body>

<div class="top-panel">
  <div class="header">
    <div class="logo">ARMORY</div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
    </div>
  </div>
  <div class="toolbar">
    <div class="toolbar-row">
      <button class="btn btn-accent" onclick="addItem()">+ Add Item</button>
      <button class="btn btn-ghost" onclick="startBulkLookup()">⚡ Bulk Lookup</button>
    </div>
  </div>
</div>

<div class="scroll-area">
  <table>
    <thead><tr><th>Name</th><th>UPC</th><th>Type</th><th>Caliber</th></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="modal-overlay" id="bulkProgressOverlay">
  <div class="modal">
    <h2>Bulk Lookup Progress</h2>
    <div id="bulkResultLog"></div>
    <button class="btn btn-accent" style="margin-top:10px" onclick="location.reload()">Close & Refresh</button>
  </div>
</div>

<script>
const OPENROUTER_KEY = "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";
let data = [];

async function callClaude(prompt) {
  const models = ["google/gemini-2.0-flash-001", "google/gemini-2.0-flash-lite-preview-02-05:free"];
  for (const model of models) {
    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": "Bearer " + OPENROUTER_KEY, "Content-Type": "application/json" },
        body: JSON.stringify({
          model: model,
          messages: [{ role: "user", content: prompt + " Respond ONLY with JSON like: {\"upc\":\"\",\"type\":\"\",\"caliber\":\"\"}" }],
          response_format: { type: "json_object" }
        })
      });
      const j = await res.json();
      if (j.choices?.[0]) return j.choices[0].message.content;
    } catch (e) { console.error(e); }
  }
  throw new Error("Services limited.");
}

async function startBulkLookup() {
  const overlay = document.getElementById('bulkProgressOverlay');
  const log = document.getElementById('bulkResultLog');
  overlay.classList.add('open');
  
  for (let i = 0; i < data.length; i++) {
    const item = data[i];
    if (!item.upc || !item.type) {
      try {
        log.innerHTML += `<div>Searching for ${item.name}...</div>`;
        const result = await callClaude(`Find firearm specs for ${item.name}`);
        const json = JSON.parse(result);
        Object.assign(item, json);
        log.innerHTML += `<div style="color:green">✅ Success</div>`;
      } catch (e) {
        log.innerHTML += `<div style="color:red">❌ Failed: ${e.message}</div>`;
      }
    }
  }
  await window._fbSave(data);
  renderTable();
}

function renderTable() {
  const body = document.getElementById('tableBody');
  body.innerHTML = data.map(i => `<tr><td>${i.name}</td><td>${i.upc||''}</td><td>${i.type||''}</td><td>${i.caliber||''}</td></tr>`).join('');
  document.getElementById('stat-total').innerText = data.length;
}

async function addItem() {
  const name = prompt("Enter Firearm Name:");
  if(name) {
    data.push({ name });
    await window._fbSave(data);
    renderTable();
  }
}

document.addEventListener('firebase-ready', async () => {
  data = await window._fbLoad() || [];
  renderTable();
});
</script>
</body>
</html>
